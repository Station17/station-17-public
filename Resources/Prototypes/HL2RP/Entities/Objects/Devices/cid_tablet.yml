- type: entity
  parent: BaseItem
  id: CIDTablet
  suffix: HL2RP
  name: CID tablet
  description: Administrative tablet for viewing and issuing CID cards.
  components:
  - type: Appearance
  - type: Sprite
    sprite: HL2RP/Objects/Devices/cid_tablet.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: no-cid
    - map: [ "enum.PdaVisualLayers.IdLight" ]
      state: with-cid
      visible: false
  - type: Icon
    sprite: HL2RP/Objects/Devices/cid_tablet.rsi
    state: no-cid
  - type: PdaVisuals
  - type: Item
    size: Small
  - type: Clothing
    slots:
    - idcard
    sprite: HL2RP/Objects/Devices/cid_tablet.rsi
  - type: ActivatableUI
    key: enum.CIDTabletUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.CIDTabletUiKey.Key:
        type: CIDTabletBoundUserInterface
  - type: ContainerContainer
    containers:
      cid-main-card: !type:ContainerSlot { }
      cid-issue-card: !type:ContainerSlot { }
  - type: ItemSlots
    slots:
      cid-main-card:
        name: Основная CID-карта
        whitelist:
          components:
          - CIDCard
      cid-issue-card:
        name: Пустая CID-карта для выдачи
        whitelist:
          components:
          - CIDCard
  - type: CIDTablet
  - type: Tag
    tags:
    - DoorBumpOpener

